<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Reservation</title>
    <link rel="stylesheet" href="flight.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="navbar">
            <h1>SKYFLICKS</h1>

            <div class="menu">
                <a  href="#"><i class="fa-solid fa-suitcase"></i>   Travel </a>
                <a  href="#"><i class="fa-solid fa-earth-americas"></i> Explore </a>
                <a  href="#"><i class="fa-solid fa-hotel"></i> Hotels </a>
                <a  href="#"><i class="fa-solid fa-bus"></i> Buses </a>
                <a  href="#"><i class="fa-solid fa-taxi"></i> Cabs </a>
            </div>
            <button class="login-btn" > Log in </button>
        </header>

        <section class="hero">
            <div class="search-box">
                <div class="Search-opt">
                <select>
                    <option> Round Trip </option>
                    <option> One Way </option>
                    <option> Multi-City </option>

                </select>

                <select>
                    <option> Traveller </option>
                    <option> 2 Travellers </option>
                    <option> 3+ Travellers </option>
                </select>

                <select>
                    <option> Economy </option>
                    <option> Business </option>
                    <option> First  </option>
                </select>
                <div class="inputs">
                <input type="text" placeholder="Where From ?">
                <input type="text" placeholder="To ">
                <input type="date"  value="2025-08-08">
                <input type="date"  value="2025-09-08">



                
                <div class="Search-btn">
                    <button>Search</button>
                </div>
            </div>
            </div>
            </div>
            
         </section>
    
</body>
</html>
